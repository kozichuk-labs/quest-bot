name: Deploy Quest Bot

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Pull Latest Code and Restart Containers
        run: |
          # ВАЖЛИВО: Замініть цей шлях на реальний шлях до папки quest-bot на вашому сервері
          # Наприклад: cd /DATA/AppData/quest-bot
          cd /DATA/AppData/quest-bot
          
          # Оновлюємо код
          git pull origin main
          
          # Перезапускаємо контейнери
          if docker compose version > /dev/null 2>&1; then
            docker compose down
            docker compose up -d --build
          else
            docker-compose down
            docker-compose up -d --build
          fi
